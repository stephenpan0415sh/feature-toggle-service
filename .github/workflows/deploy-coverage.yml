name: Deploy JaCoCo Coverage Report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and generate coverage reports
        run: ./mvnw clean verify -DskipTests=false

      - name: Copy JaCoCo reports to navigation directory
        run: |
          mkdir -p docs/08-testing/test-coverage-report/ff-server
          mkdir -p docs/08-testing/test-coverage-report/ff-sdk-java
          mkdir -p docs/08-testing/test-coverage-report/ff-sdk-core
          mkdir -p docs/08-testing/test-coverage-report/ff-common
          cp -r ff-server/target/site/jacoco/* docs/08-testing/test-coverage-report/ff-server/
          cp -r ff-sdk-java/target/site/jacoco/* docs/08-testing/test-coverage-report/ff-sdk-java/
          cp -r ff-sdk-core/target/site/jacoco/* docs/08-testing/test-coverage-report/ff-sdk-core/
          cp -r ff-common/target/site/jacoco/* docs/08-testing/test-coverage-report/ff-common/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload coverage report artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/08-testing/test-coverage-report'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
