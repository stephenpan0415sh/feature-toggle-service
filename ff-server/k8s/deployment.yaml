apiVersion: v1
kind: ConfigMap
metadata:
  name: ff-config-prod
data:
  db-url: "jdbc:mysql://mysql-service-prod:3306/feature_toggle?useSSL=false&serverTimezone=UTC"
  redis-host: "redis-service-prod"
  environment: "prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: ff-secrets-prod
type: Opaque
data:
  db-username: cm9vdA==  # base64 encoded "root"
  db-password: cm9vdA==  # base64 encoded "root"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ff-server-prod
  labels:
    app: feature-toggle-service
    component: server
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-toggle-service
      component: server
      environment: prod
  template:
    metadata:
      labels:
        app: feature-toggle-service
        component: server
        environment: prod
    spec:
      containers:
      - name: ff-server
        image: feature-toggle/ff-server:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: FEATURE_TOGGLE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ff-config-prod
              key: environment
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: ff-config-prod
              key: db-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: ff-secrets-prod
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ff-secrets-prod
              key: db-password
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: ff-config-prod
              key: redis-host
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ff-server-service-prod
  labels:
    app: feature-toggle-service
    component: server
    environment: prod
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: feature-toggle-service
    component: server
    environment: prod
