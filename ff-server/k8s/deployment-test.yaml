# Test Environment Deployment
# Apply with: kubectl apply -f deployment-test.yaml -n test-namespace

apiVersion: v1
kind: ConfigMap
metadata:
  name: ff-config-test
data:
  db-url: "jdbc:mysql://mysql-service-test:3306/feature_toggle?useSSL=false&serverTimezone=UTC"
  redis-host: "redis-service-test"
  environment: "test"
---
apiVersion: v1
kind: Secret
metadata:
  name: ff-secrets-test
type: Opaque
data:
  db-username: dGVzdA==  # base64 encoded "test"
  db-password: dGVzdA==  # base64 encoded "test"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ff-server-test
  labels:
    app: feature-toggle-service
    component: server
    environment: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feature-toggle-service
      component: server
      environment: test
  template:
    metadata:
      labels:
        app: feature-toggle-service
        component: server
        environment: test
    spec:
      containers:
      - name: ff-server
        image: feature-toggle/ff-server:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: FEATURE_TOGGLE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ff-config-test
              key: environment
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: ff-config-test
              key: db-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: ff-secrets-test
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ff-secrets-test
              key: db-password
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: ff-config-test
              key: redis-host
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ff-server-service-test
  labels:
    app: feature-toggle-service
    component: server
    environment: test
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: feature-toggle-service
    component: server
    environment: test
